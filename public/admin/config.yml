backend:
  name: github
  repo: drewpager/bus-stop-beer-garden
  branch: main

media_folder: public/images
public_folder: /images

collections:
  - name: menu_items
    label: Menu Items
    folder: src/content/menu
    create: true
    slug: "{{slug}}"
    fields:
      - { label: Name, name: name, widget: string }
      - { label: Style, name: style, widget: string }
      - { label: Size, name: size, widget: string }
      - { label: ABV, name: abv, widget: number, value_type: float }
      - { label: Price, name: price, widget: number, value_type: int }
      - { label: Description, name: body, widget: markdown, required: false }

  - name: events
    label: Events
    folder: src/content/events
    create: true
    slug: "{{slug}}"
    fields:
      - { label: Title, name: title, widget: string }
      - { label: Date, name: date, widget: datetime, type: date, format: YYYY-MM-DD }
      - { label: Time, name: time, widget: string }
      - { label: Description, name: description, widget: text }

  - name: plants
    label: Plants
    folder: src/content/plants
    create: true
    slug: "{{slug}}"
    fields:
      - { label: Name, name: name, widget: string }
      - { label: Price, name: price, widget: number, value_type: int }
      - { label: Description, name: description, widget: text }

  - name: stops
    label: Stops / Locations
    folder: src/content/stops
    create: true
    slug: "{{slug}}"
    fields:
      - { label: Name, name: name, widget: string }
      - { label: Address, name: address, widget: string }
      - { label: Hours, name: hours, widget: string }
      - { label: Phone, name: phone, widget: string }
      - { label: Email, name: email, widget: string }
      - { label: Description, name: description, widget: text }
